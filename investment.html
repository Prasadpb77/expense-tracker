<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Reports</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="layout">

<aside class="sidebar">
<h2>💰 Finance</h2>
<ul>
<li onclick="location.href='dashboard.html'">Dashboard</li>
<li onclick="location.href='transactions.html'">Transactions</li>
<li onclick="location.href='goals.html'">Goals</li>
<li class="active">Investments</li>
<li onclick="location.href='reports.html'">Reports</li>
<li onclick="location.href='budgets.html'">Reports</li>
</ul>
</aside>

<main>
<h1>📈 Investment Reports</h1>

<div class="cards">
  <div class="card income-card">
    <h3>Total Investment</h3>
    <h2 id="totalInvestment">₹0</h2>
  </div>
</div>

<div class="charts">
  <div class="chart-card">
    <h3>Monthly Investment (Current Year)</h3>
    <canvas id="monthlyChart"></canvas>
  </div>

  <div class="chart-card">
    <h3>Member-wise Investment</h3>
    <canvas id="memberChart"></canvas>
  </div>

  <div class="chart-card">
    <h3>Yearly Investment</h3>
    <canvas id="yearlyChart"></canvas>
  </div>
</div>

</main>
</div>

<script type="module" src="js/investment-reports.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
