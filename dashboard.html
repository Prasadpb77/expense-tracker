<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h2>💰 Finance</h2>

        <ul>
            <li class="active">Dashboard</li>
            <li>Transactions</li>
            <li>Reports</li>
            <li>Goals</li>
        </ul>

        <button id="logoutBtn" class="logout-btn">
            Logout
        </button>

    </aside>

    <main>

        <div class="topbar">

            <h1>
                Prasad ❤️ Bhagyashree
            </h1>

        </div>

        <div class="cards">

            <div class="card income-card">
                <h3>Total Income</h3>
                <h2 id="incomeTotal">₹0</h2>
            </div>

            <div class="card expense-card">
                <h3>Total Expense</h3>
                <h2 id="expenseTotal">₹0</h2>
            </div>

            <div class="card balance-card">
                <h3>Balance</h3>
                <h2 id="balanceTotal">₹0</h2>
            </div>

        </div>

        <div class="add-section">

            <h2>Add Transaction</h2>

            <form id="transactionForm">

                <select id="member">
                    <option>Prasad</option>
                    <option>Bhagyashree</option>
                    <option>Comman</option>
                </select>

                <select id="type">
                    <option>Income</option>
                    <option>Expense</option>
                </select>

                <select id="category">

                    <option>Salary</option>
                    <option>Food</option>
                    <option>Fuel</option>
                    <option>Travel</option>
                    <option>Shopping</option>
                    <option>Bills</option>
                    <option>EMI</option>
                    <option>Medical</option>
                    <option>Entertainment</option>
                    <option>Investment</option>
                    <option>Other</option>

                </select>

                <input
                    type="number"
                    id="amount"
                    placeholder="Amount"
                    required>

                <input
                    type="text"
                    id="description"
                    placeholder="Description">

                <button type="submit">
                    Save Transaction
                </button>

            </form>

        </div>

        <div class="charts">

            <div class="chart-card">
                <canvas id="expenseChart"></canvas>
            </div>

            <div class="chart-card">
                <canvas id="memberChart"></canvas>
            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module"
src="js/dashboard.js">
</script>

</body>

</html>
